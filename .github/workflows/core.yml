name: EasyTier Core

on:
  # --- 手动触发（Workflow Dispatch）---
  workflow_dispatch:
    inputs:
      release_type:
        description: 'Select the type of release to build and publish.'
        required: true
        default: 'nightly'
        type: choice
        options:
          - nightly
          - release
  
  # --- 定时触发 (如果不需要，请注释掉或删除此部分) ---
  # schedule:
  #   - cron: "0 0 * * *" 

env:
  CARGO_TERM_COLOR: always

defaults:
  run:
    shell: bash

jobs:
  pre_job:
    runs-on: ubuntu-latest
    outputs:
      should_skip: ${{ steps.skip_check.outputs.should_skip == 'true' && !startsWith(github.ref_name, 'releases/') }}
    steps:
      - id: skip_check
        uses: fkirc/skip-duplicate-actions@v5
        with:
          concurrent_skipping: 'same_content_newer'
          skip_after_successful_duplicate: 'true'
          cancel_others: 'true'
          paths: '["Cargo.toml", "Cargo.lock", "easytier/**", ".github/workflows/core.yml", ".github/workflows/install_rust.sh"]'
  
  build_web:
    runs-on: ubuntu-latest
    needs: pre_job
    if: needs.pre_job.outputs.should_skip != 'true'
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false
      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV
      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-
      - name: Install frontend dependencies
        run: |
          pnpm -r install
          pnpm -r --filter "./easytier-web/*"  build
      - name: Archive artifact
        uses: actions/upload-artifact@v4
        with:
          name: easytier-web-dashboard
          path: |
            easytier-web/frontend/dist/*
            
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - TARGET: aarch64-unknown-linux-musl
            OS: ubuntu-22.04
            ARTIFACT_NAME: linux-aarch64
          - TARGET: x86_64-unknown-linux-musl
            OS: ubuntu-22.04
            ARTIFACT_NAME: linux-x86_64
          - TARGET: riscv64gc-unknown-linux-musl
            OS: ubuntu-22.04
            ARTIFACT_NAME: linux-riscv64
          - TARGET: mips-unknown-linux-musl
            OS: ubuntu-22.04
            ARTIFACT_NAME: linux-mips
          - TARGET: mipsel-unknown-linux-musl
            OS: ubuntu-22.04
            ARTIFACT_NAME: linux-mipsel
          - TARGET: armv7-unknown-linux-musleabihf
            OS: ubuntu-22.04
            ARTIFACT_NAME: linux-armv7hf
          - TARGET: armv7-unknown-linux-musleabi
            OS: ubuntu-22.04
            ARTIFACT_NAME: linux-armv7
          - TARGET: arm-unknown-linux-musleabihf
            OS: ubuntu-22.04
            ARTIFACT_NAME: linux-armhf
          - TARGET: arm-unknown-linux-musleabi
            OS: ubuntu-22.04
            ARTIFACT_NAME: linux-arm
          - TARGET: loongarch64-unknown-linux-musl
            OS: ubuntu-24.04
            ARTIFACT_NAME: linux-loongarch64
          - TARGET: x86_64-apple-darwin
            OS: macos-latest
            ARTIFACT_NAME: macos-x86_64
          - TARGET: aarch64-apple-darwin
            OS: macos-latest
            ARTIFACT_NAME: macos-aarch64
          - TARGET: x86_64-pc-windows-msvc
            OS: windows-latest
            ARTIFACT_NAME: windows-x86_64
          - TARGET: aarch64-pc-windows-msvc
            OS: windows-latest
            ARTIFACT_NAME: windows-arm64
          - TARGET: i686-pc-windows-msvc
            OS: windows-latest
            ARTIFACT_NAME: windows-i686
          - TARGET: x86_64-unknown-freebsd
            OS: ubuntu-22.04
            ARTIFACT_NAME: freebsd-13.2-x86_64
            BSD_VERSION: 13.2

    runs-on: ${{ matrix.OS }}
    env:
      NAME: easytier
      TARGET: ${{ matrix.TARGET }}
      OS: ${{ matrix.OS }}
      OSS_BUCKET: ${{ secrets.ALIYUN_OSS_BUCKET }}
    needs:
      - pre_job
      - build_web
    if: needs.pre_job.outputs.should_skip != 'true'
    steps:
      - uses: actions/checkout@v3
      - name: Set current ref as env variable
        run: |
          echo "GIT_DESC=$(git log -1 --format=%cd.%h --date=format:%Y-%m-%d_%H:%M:%S)" >> $GITHUB_ENV
      - name: Download web artifact
        uses: actions/download-artifact@v4
        with:
          name: easytier-web-dashboard
          path: easytier-web/frontend/dist/
      - uses: Swatinem/rust-cache@v2
        if: ${{ ! endsWith(matrix.TARGET, 'freebsd') }}
        with:
          prefix-key: ""
      - name: Setup protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Build Core & Cli
        if: ${{ ! endsWith(matrix.TARGET, 'freebsd') }}
        run: |
          bash ./.github/workflows/install_rust.sh
          if [[ $TARGET =~ ^loongarch.*$ ]]; then
            sudo apt-get install -qq llvm-18 clang-18
            export LLVM_CONFIG_PATH=/usr/lib/llvm-18/bin/llvm-config
          fi
          if [[ -d "./musl_gcc/sysroot" ]]; then
            export BINDGEN_EXTRA_CLANG_ARGS=--sysroot=$(readlink -f ./musl_gcc/sysroot)
          fi
          if [[ $OS =~ ^ubuntu.*$ && $TARGET =~ ^mips.*$ ]]; then
            cargo +nightly-2025-09-01 build -r --target $TARGET -Z build-std=std,panic_abort --package=easytier --features=jemalloc
          else
            if [[ $OS =~ ^windows.*$ ]]; then
              SUFFIX=.exe
              CORE_FEATURES="--features=mimalloc"
            elif [[ $TARGET =~ ^riscv64.*$ || $TARGET =~ ^loongarch64.*$ || $TARGET =~ ^aarch64.*$ ]]; then
              CORE_FEATURES="--features=mimalloc"
            else
              CORE_FEATURES="--features=jemalloc"
            fi
            cargo build --release --target $TARGET --package=easytier-web --features=embed
            mv ./target/$TARGET/release/easytier-web"$SUFFIX" ./target/$TARGET/release/easytier-web-embed"$SUFFIX"
            cargo build --release --target $TARGET $CORE_FEATURES
          fi
      - name: Build Core & Cli (X86_64 FreeBSD)
        uses: vmactions/freebsd-vm@v1
        if: ${{ endsWith(matrix.TARGET, 'freebsd') }}
        env:
          TARGET: ${{ matrix.TARGET }}
        with:
          envs: TARGET
          release: ${{ matrix.BSD_VERSION }}
          arch: x86_64
          usesh: true
          mem: 6144
          cpu: 4
          run: |
            uname -a
            echo $SHELL
            pwd
            ls -lah
            whoami
            env | sort
            pkg install -y git protobuf llvm-devel sudo curl
            curl --proto 'https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
            . $HOME/.cargo/env
            rustup set auto-self-update disable
            rustup install 1.89
            rustup default 1.89
            export CC=clang
            export CXX=clang++
            export CARGO_TERM_COLOR=always
            cargo build --release --verbose --target $TARGET --package=easytier-web --features=embed
            mv ./target/$TARGET/release/easytier-web ./target/$TARGET/release/easytier-web-embed
            cargo build --release --verbose --target $TARGET --features=mimalloc
      - name: Compress
        run: |
          mkdir -p ./artifacts/objects/
          if [[ $OS =~ ^windows.*$ && $TARGET =~ ^x86_64.*$ ]]; then
              SUFFIX=.exe
              cp easytier/third_party/*.dll ./artifacts/objects/
          elif [[ $OS =~ ^windows.*$ && $TARGET =~ ^i686.*$ ]]; then
              SUFFIX=.exe
              cp easytier/third_party/i686/*.dll ./artifacts/objects/
          elif [[ $OS =~ ^windows.*$ && $TARGET =~ ^aarch64.*$ ]]; then
              SUFFIX=.exe
              cp easytier/third_party/arm64/*.dll ./artifacts/objects/
          fi
          if [[ $GITHUB_REF_TYPE =~ ^tag$ ]]; then
            TAG=$GITHUB_REF_NAME
          else
            TAG=$GITHUB_SHA
          fi
          if [[ $OS =~ ^ubuntu.*$ && ! $TARGET =~ ^.*freebsd$ && ! $TARGET =~ ^loongarch.*$ && ! $TARGET =~ ^riscv64.*$ ]]; then
            UPX_VERSION=4.2.4
            curl -L https://github.com/upx/upx/releases/download/v${UPX_VERSION}/upx-${UPX_VERSION}-amd64_linux.tar.xz -s | tar xJvf -
            cp upx-${UPX_VERSION}-amd64_linux/upx .
            ./upx --lzma --best ./target/$TARGET/release/easytier-core"$SUFFIX"
            ./upx --lzma --best ./target/$TARGET/release/easytier-cli"$SUFFIX"
          fi
          mv ./target/$TARGET/release/easytier-core"$SUFFIX" ./artifacts/objects/
          mv ./target/$TARGET/release/easytier-cli"$SUFFIX" ./artifacts/objects/
          if [[ ! $TARGET =~ ^mips.*$ ]]; then
            mv ./target/$TARGET/release/easytier-web"$SUFFIX" ./artifacts/objects/
            mv ./target/$TARGET/release/easytier-web-embed"$SUFFIX" ./artifacts/objects/
          fi
          mv ./artifacts/objects/* ./artifacts/
          rm -rf ./artifacts/objects/
      - name: Archive artifact
        uses: actions/upload-artifact@v4
        with:
          name: easytier-${{ matrix.ARTIFACT_NAME }}
          path: |
            ./artifacts/*

  core-result:
    if: always()
    runs-on: ubuntu-latest
    needs:
      - pre_job
      - build_web
      - build
    steps:
      - name: Mark result as failed
        if: needs.build.result != 'success'
        run: exit 1

  magisk_build:
    needs: 
      - pre_job
      - build_web
      - build
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Download Linux aarch64 binaries
        uses: actions/download-artifact@v4
        with:
          name: easytier-linux-aarch64
          path: ./downloaded-binaries/
      - name: Prepare binaries
        run: |
          mkdir -p ./easytier-contrib/easytier-magisk/
          cp ./downloaded-binaries/easytier-core ./easytier-contrib/easytier-magisk/
          cp ./downloaded-binaries/easytier-cli ./easytier-contrib/easytier-magisk/
          cp ./downloaded-binaries/easytier-web ./easytier-contrib/easytier-magisk/
      - name: Upload Magisk Module
        uses: actions/upload-artifact@v4
        with:
          name: Easytier-Magisk
          path: |
            ./easytier-contrib/easytier-magisk
            !./easytier-contrib/easytier-magisk/build.sh
            !./easytier-contrib/easytier-magisk/magisk_update.json
          if-no-files-found: error
          
  publish_docker:
    runs-on: ubuntu-latest
    # 依赖所有构建和 Magisk 作业
    needs: 
      - build
      - magisk_build 
    if: (github.event_name == 'workflow_dispatch' || github.event_name == 'schedule') && needs.build.result == 'success'
    env:
      DOCKER_IMAGE_NAME: your_dockerhub_username/easy-tier-core # <-- **请修改为你自己的 Docker Hub 用户名**
      RELEASE_MODE: ${{ github.event.inputs.release_type || 'nightly' }}
      TAG_NAME: easytier-${{ github.event.inputs.release_type == 'release' && format('v{0}', github.run_id) || format('nightly-{0}', github.run_id) }}
    
    strategy:
      fail-fast: false
      matrix:
        platform:
          # 仅构建 AMD64 (x86_64) 和 ARM64 (aarch64)
          - ARCH: x86_64
            ARTIFACT_SUFFIX: linux-x86_64
            BASE_IMAGE_ARCH: linux/amd64
          - ARCH: aarch64
            ARTIFACT_SUFFIX: linux-aarch64
            BASE_IMAGE_ARCH: linux/arm64
            
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
        
      # 1. 登录 Docker Hub
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 2. 下载特定架构的 Artifact
      - name: Download Artifact for ${{ matrix.ARCH }}
        uses: actions/download-artifact@v4
        with:
          name: easytier-${{ matrix.ARTIFACT_SUFFIX }} # 修正：确保名称匹配
          path: ./docker_build_context/

      # 3. 设置 Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 4. 构建并推送镜像 (版本 Tag 和 latest Tag)
      - name: Build and Push Docker Image for ${{ matrix.ARCH }}
        run: |
          # 复制二进制文件到构建上下文
          cp ./docker_build_context/easytier-core ./docker_build_context/
          cp ./docker_build_context/easytier-cli ./docker_build_context/
          
          VERSION_TAG=${{ env.DOCKER_IMAGE_NAME }}:${{ env.TAG_NAME }}-${{ matrix.ARCH }}
          LATEST_TAG=${{ env.DOCKER_IMAGE_NAME }}:latest-${{ matrix.ARCH }} # 架构特定的 latest
          
          # 使用 buildx 构建并推送到版本 Tag
          docker buildx build \
            --platform ${{ matrix.BASE_IMAGE_ARCH }} \
            --build-arg RELEASE_TAG=${{ env.TAG_NAME }} \
            -t $VERSION_TAG \
            -f Dockerfile \
            --push \
            ./docker_build_context 
          
          # 如果是 nightly 模式，也推送到 latest 标签 (针对当前架构)
          if [[ "${{ env.RELEASE_MODE }}" == "nightly" ]]; then
              docker buildx build \
                --platform ${{ matrix.BASE_IMAGE_ARCH }} \
                --build-arg RELEASE_TAG=${{ env.TAG_NAME }} \
                -t $LATEST_TAG \
                -f Dockerfile \
                --push \
                ./docker_build_context 
          fi
          
  create_release:
    runs-on: ubuntu-latest
    needs: 
      - build
      - magisk_build
      - publish_docker # 确保 Docker 发布成功
    # 仅在 workflow_dispatch 或 schedule 触发，并且构建成功时运行
    if: (github.event_name == 'workflow_dispatch' || github.event_name == 'schedule') && needs.build.result == 'success'
    env:
      RELEASE_MODE: ${{ github.event.inputs.release_type || 'nightly' }}
      RELEASE_NAME: ${{ github.event.inputs.release_type == 'release' && format('v{0}', github.run_id) || format('nightly-{0}', github.run_id) }}

    steps:
      # 1. 下载所有构建的 Artifacts
      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./release_assets/

      # 2. 创建 GitHub Release
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          token: ${{ secrets.GH_RELEASE_PAT }} # 使用自定义 PAT 解决 403 错误
          tag_name: easytier-${{ env.RELEASE_NAME }}
          name: EasyTier ${{ env.RELEASE_NAME }}
          body: |
            This build was triggered automatically by ${{ github.event_name }}.
            Mode: ${{ env.RELEASE_MODE }}
            
            All supported platform binaries, Magisk module, and Docker images (AMD64/ARM64) are attached below.
          draft: ${{ env.RELEASE_MODE != 'release' }}
          prerelease: ${{ env.RELEASE_MODE == 'nightly' }}
          
          files: |
            ./release_assets/*/*
            ./release_assets/Easytier-Magisk/**/*